<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Share</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: #1e293b; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        .btn { background: #38bdf8; color: #0f172a; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
        #linkBox { background: #0f172a; padding: 12px; border-radius: 8px; font-size: 11px; margin: 15px 0; word-break: break-all; border: 1px dashed #38bdf8; color: #38bdf8; }
        #status { font-size: 14px; color: #94a3b8; margin-top: 20px; font-weight: bold; }
        input[type="file"] { margin: 20px 0; width: 100%; color: #94a3b8; }
        progress { width: 100%; height: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Turbo Share</h2>
        
        <div id="setupArea">
            <p style="font-size: 12px; color: #94a3b8;">Send this link to the other device:</p>
            <div id="linkBox">Generating...</div>
            <button class="btn" onclick="copyLink()" style="background: #0ea5e9; color: white;">Copy Link</button>
        </div>

        <input type="file" id="fileInput">
        <progress id="progress" value="0" max="100"></progress>
        <button class="btn" id="sendBtn" onclick="sendFile()" disabled>Searching Peer...</button>
        <p id="status">Connecting...</p>
        <button id="retryBtn" class="btn" style="display:none; background:#64748b; font-size:12px;" onclick="location.reload()">Retry Connection</button>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io({ transports: ['polling', 'websocket'] });
        const urlParams = new URLSearchParams(window.location.search);
        let room = urlParams.get('room');

        if (!room) {
            room = "share-" + Math.random().toString(36).substr(2, 9);
            document.getElementById('linkBox').innerText = window.location.origin + window.location.pathname + "?room=" + room;
        } else {
            document.getElementById('setupArea').style.display = "none";
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('linkBox').innerText);
            alert("Link copied!");
        }

        let pc;
        let dc;
        const config = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                { urls: "stun:global.stun.twilio.com:3478" }
            ],
            iceCandidatePoolSize: 10
        };

        socket.on('connect', () => {
            document.getElementById('status').innerText = "Server Active. Waiting for peer...";
            socket.emit('join', room);
        });

        function createPeer() {
            if (pc) pc.close();
            pc = new RTCPeerConnection(config);
            
            pc.onicecandidate = (e) => {
                if (e.candidate) socket.emit('signal', { room, candidate: e.candidate });
            };
            
            pc.ondatachannel = (event) => {
                dc = event.channel;
                handleDataChannel();
            };

            pc.oniceconnectionstatechange = () => {
                const state = pc.iceConnectionState;
                document.getElementById('status').innerText = "ICE: " + state;
                if (state === 'failed' || state === 'disconnected') {
                    document.getElementById('retryBtn').style.display = 'block';
                }
            };
        }

        function handleDataChannel() {
            dc.onopen = () => {
                document.getElementById('status').innerText = "Connected!";
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('sendBtn').innerText = "Send File";
            };
            
            let receivedChunks = [];
            dc.onmessage = (e) => {
                if (e.data === 'EOF') {
                    const blob = new Blob(receivedChunks);
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = "file_" + Date.now(); a.click();
                    receivedChunks = [];
                    document.getElementById('status').innerText = "Received!";
                } else {
                    receivedChunks.push(e.data);
                }
            };
        }

        socket.on('user-joined', async () => {
            document.getElementById('status').innerText = "Peer Found! Handshaking...";
            createPeer();
            dc = pc.createDataChannel("file-transfer", { ordered: true });
            handleDataChannel();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('signal', { room, offer });
        });

        socket.on('signal', async (data) => {
            if (!pc) createPeer();
            if (data.offer) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('signal', { room, answer });
            } else if (data.answer) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.candidate) {
                pc.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(e => {});
            }
        });

        async function sendFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file || !dc || dc.readyState !== 'open') return;

            const CHUNK_SIZE = 16384; 
            const buffer = await file.arrayBuffer();
            document.getElementById('progress').style.display = "block";

            for (let i = 0; i < buffer.byteLength; i += CHUNK_SIZE) {
                dc.send(buffer.slice(i, i + CHUNK_SIZE));
                document.getElementById('progress').value = Math.round(((i + CHUNK_SIZE) / buffer.byteLength) * 100);
            }
            dc.send('EOF');
            document.getElementById('status').innerText = "Sent!";
        }
    </script>
</body>
</html>
