<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Share - Fast & Secure</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4facfe; --secondary: #00f2fe;
            --bg-dark: #080c14; --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1); --accent-green: #4ade80;
        }

        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark); color: #fff;
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        header { text-align: center; padding: 60px 20px 20px; }
        header h1 {
            font-size: 3.5rem; margin: 0; letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 30%, var(--secondary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .upload-card {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 32px; text-align: center;
            border: 1px solid var(--glass-border); width: 100%; max-width: 450px;
        }

        .file-input-wrapper {
            position: relative; margin-bottom: 25px; border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 30px; transition: 0.3s; background: rgba(255, 255, 255, 0.01);
        }

        .file-input-wrapper:hover { border-color: var(--primary); background: rgba(79, 172, 254, 0.05); }

        input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }

        .btn-main {
            width: 100%; padding: 18px; font-size: 1rem; border: none; border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000; font-weight: 700; cursor: pointer; transition: 0.3s;
        }

        .qr-wrapper { background: #fff; padding: 15px; border-radius: 20px; display: inline-block; margin: 20px 0; }
        .qr-wrapper img { display: block; width: 150px; height: 150px; }

        .result-box {
            margin-top: 20px; padding: 20px; background: rgba(74, 222, 128, 0.05);
            border: 1px solid rgba(74, 222, 128, 0.15); border-radius: 20px;
        }

        .link-container {
            display: flex; background: rgba(0, 0, 0, 0.3); border-radius: 12px;
            padding: 8px; margin-top: 10px; border: 1px solid var(--glass-border);
        }

        .link-text { flex: 1; font-size: 0.85rem; color: var(--secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 8px; }

        .btn-copy { background: rgba(255, 255, 255, 0.1); border: none; color: #fff; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
        
        footer { text-align: center; padding: 30px; font-size: 0.8rem; color: #475569; }
    </style>
</head>
<body>

    <header>
        <h1>Turbo Share</h1>
        <p>Fast, Secure, and Simple File Beaming.</p>
    </header>

    <main>
        <div class="upload-card">
            <form method="post" enctype="multipart/form-data">
                <div class="file-input-wrapper">
                    <span style="font-size: 2rem;">🚀</span>
                    <div id="file-list" style="margin: 10px 0; font-size: 0.8rem; color: var(--secondary);"></div>
                    <span id="file-name" style="display:block; color: #94a3b8;">Select or drop files</span>
                    <span style="font-size: 0.65rem; color: #475569;">Max Total Size: 50 MB</span>
                    <input type="file" name="file" required id="fileInput" multiple>
                </div>
                <button type="submit" class="btn-main">Generate Link</button>
            </form>

            {% if error %}
                <p style="color: #f87171; font-size: 0.9rem; margin-top: 15px;">{{ error }}</p>
            {% endif %}

            {% if link %}
                <div class="result-box">
                    <div style="color: var(--accent-green); font-size: 0.7rem; font-weight: 800; letter-spacing: 1px;">SECURE LINK READY</div>
                    <div class="qr-wrapper">
                        <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code">
                    </div>
                    <div class="link-container">
                        <span class="link-text" id="shareLink">{{ link }}</span>
                        <button class="btn-copy" onclick="copyLink()" id="copyBtn">Copy</button>
                    </div>
                </div>
            {% endif %}
        </div>
    </main>

    <footer>© 2026 TURBO SHARE</footer>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('file-name');
        const fileListDisplay = document.getElementById('file-list');

        fileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                const files = e.target.files;
                fileListDisplay.innerHTML = "";
                if(files.length > 1) {
                    fileNameDisplay.textContent = files.length + " files selected";
                    for(let i=0; i<Math.min(files.length, 2); i++) {
                        fileListDisplay.innerHTML += files[i].name + "<br>";
                    }
                    if(files.length > 2) fileListDisplay.innerHTML += "...";
                } else {
                    fileNameDisplay.textContent = files[0].name;
                }
                fileNameDisplay.style.color = "#00f2fe";
            }
        });

        function copyLink() {
            const link = document.getElementById('shareLink').innerText;
            navigator.clipboard.writeText(link).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = "Copy", 2000);
            });
        }
    </script>
</body>
</html>
