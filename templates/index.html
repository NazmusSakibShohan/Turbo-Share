<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Share</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg-dark: #080c14;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #4ade80;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: -10%; left: -10%;
            width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(50px);
        }

        header {
            text-align: center;
            padding: 80px 20px 30px;
        }

        header h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: -3px;
            background: linear-gradient(135deg, #fff 30%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        header p {
            font-size: 1.1rem;
            margin-top: 15px;
            color: #94a3b8;
            max-width: 550px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .upload-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 40px;
            border-radius: 32px;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 450px;
            position: relative;
        }

        .upload-card h2 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .file-input-wrapper {
            position: relative;
            margin-bottom: 25px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 20px;
            transition: all 0.4s ease;
            background: rgba(255, 255, 255, 0.01);
        }

        .file-input-wrapper:hover {
            border-color: var(--primary);
            background: rgba(79, 172, 254, 0.05);
            transform: translateY(-5px);
        }

        input[type="file"] {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: inline-block;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            font-size: 1.05rem;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-main:hover {
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.4);
            transform: scale(1.02);
        }

        /* --- QR Code Styling --- */
        .qr-wrapper {
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .qr-wrapper img {
            display: block;
            width: 160px;
            height: 160px;
        }

        .qr-label {
            color: #000;
            font-size: 0.65rem;
            font-weight: 800;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .result-box {
            margin-top: 30px;
            padding: 24px;
            background: rgba(74, 222, 128, 0.05);
            border: 1px solid rgba(74, 222, 128, 0.15);
            border-radius: 20px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .link-container {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 8px 8px 8px 15px;
            margin-top: 15px;
            border: 1px solid var(--glass-border);
        }

        .link-text {
            flex: 1;
            font-size: 0.9rem;
            color: var(--secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: left;
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 10px;
        }

        .btn-copy:hover {
            background: #fff;
            color: #000;
        }

        .btn-copy.copied {
            background: var(--accent-green);
            color: #000;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.85rem;
            color: #475569;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Turbo Share</h1>
        <p>The fastest way to beam your files across the web.</p>
    </header>

    <main>
        <div class="upload-card">
            <h2>Start Sharing</h2>
            <form method="post" enctype="multipart/form-data" id="uploadForm">
                <div class="file-input-wrapper">
                    <span class="upload-icon">🚀</span>
                    <span id="file-name" style="display:block; color: #cbd5e1;">Drop your file here</span>
                    <input type="file" name="file" required id="fileInput">
                </div>
                <button type="submit" class="btn-main">Get Secure Link</button>
            </form>

            {% if error %}
                <div style="margin-top: 20px; color: #f87171; font-size: 0.9rem;">× {{ error }}</div>
            {% endif %}

            {% if link %}
                <div class="result-box">
                    <div style="color: var(--accent-green); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px;">Link Secured</div>
                    
                    {% if qr_code %}
                    <div class="qr-wrapper">
                        <img src="data:image/png;base64,{{ qr_code }}" alt="Download QR Code">
                        <div class="qr-label">SCAN TO DOWNLOAD</div>
                    </div>
                    {% endif %}

                    <div class="link-container">
                        <span class="link-text" id="shareLink">{{ link }}</span>
                        <button class="btn-copy" onclick="copyToClipboard()" id="copyBtn">Copy</button>
                    </div>
                </div>
            {% endif %}
        </div>
    </main>

    <footer>
        <p>© 2026 TURBO SHARE · ENCRYPTED & FAST</p>
    </footer>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('file-name');

        fileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                fileNameDisplay.textContent = e.target.files[0].name;
                fileNameDisplay.style.color = '#00f2fe';
                fileNameDisplay.style.fontWeight = '700';
            }
        });

        function copyToClipboard() {
            const linkText = document.getElementById('shareLink').innerText;
            const copyBtn = document.getElementById('copyBtn');
            
            navigator.clipboard.writeText(linkText).then(() => {
                copyBtn.innerText = 'Copied!';
                copyBtn.classList.add('copied');
                
                setTimeout(() => {
                    copyBtn.innerText = 'Copy';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
